<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Reseña - Comer.ar</title>
    <meta name="description" content="Interfaz de carga para Críticos">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <style>
        .carga-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 20px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }

        .form-select, .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-select:hover:not(:disabled), .form-input:hover:not(:disabled) {
            border-color: var(--text-muted);
        }

        .form-select:focus, .form-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .form-select:disabled, .form-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.02);
        }

        .dark-mode .form-select:disabled, .dark-mode .form-input:disabled {
            background: rgba(255, 255, 255, 0.02);
        }

        .dynamic-fields-container {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            opacity: 0;
            transform: translateY(10px);
            display: none;
        }

        .dynamic-fields-container.show {
            display: block;
            animation: fadeInFields 0.4s ease forwards;
        }

        @keyframes fadeInFields {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            background: var(--gold);
            color: #fff;
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        .submit-btn.loading .spinner {
            display: inline-block;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Message Box */
        .message-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .message-box.success {
            display: block;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .message-box.error {
            display: block;
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        /* Layout modifications */
        .carga-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .score-row-inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .averages-input {
            grid-column: 1 / -1;
            background: rgba(255, 145, 0, 0.05);
            border-color: rgba(255, 145, 0, 0.3);
        }

        .dark-mode .averages-input {
            background: rgba(255, 145, 0, 0.1);
        }

    </style>
</head>

<body class="light-mode">
    <div id="app">
        <!-- Settings -->
        <nav class="settings-nav" aria-label="Configuración">
            <div class="dropdown">
                <button id="settings-btn" class="icon-btn" aria-label="Abrir menú de configuración">
                    <i data-lucide="settings"></i>
                </button>
                <div id="settings-menu" class="dropdown-content hidden" role="menu">
                    <div class="menu-item" role="menuitem">
                        <span>Modo Oscuro</span>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-toggle" aria-label="Activar modo oscuro">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>
            </div>
            
            <a href="index.html" class="icon-btn" style="margin-right: 0.5rem; text-decoration: none; display: inline-flex" aria-label="Volver a Inicio">
                <i data-lucide="home"></i>
            </a>
        </nav>

        <header class="carga-header">
            <div class="logo-container">
                <img src="./fotos/imagenes/logoB.png" alt="Comer.ar Logo" class="logo-img light-logo">
                <img src="./fotos/imagenes/logoW.png" alt="Comer.ar Logo" class="logo-img dark-logo">
            </div>
            <h1 style="font-family: var(--font-title); font-size: 2rem; margin-top: 1rem;">Carga de Reseña</h1>
            <p class="subtitle" id="status-text">Conectando con la base de datos...</p>
        </header>

        <main class="view glass-effect carga-container">
            <form id="review-form">
                
                <!-- Critic Selector -->
                <div class="form-group">
                    <label for="critic-select" class="form-label">
                        <i data-lucide="user"></i>
                        Crítico
                    </label>
                    <select id="critic-select" class="form-select" disabled required>
                        <option value="" disabled selected>Cargando críticos...</option>
                    </select>
                </div>

                <!-- Date Selector -->
                <div class="form-group">
                    <label for="date-select" class="form-label">
                        <i data-lucide="calendar"></i>
                        Fecha de la visita
                    </label>
                    <select id="date-select" class="form-select" disabled required>
                        <option value="" disabled selected>Cargando fechas...</option>
                    </select>
                </div>

                <!-- Restaurant Selector -->
                <div class="form-group">
                    <label for="restaurant-select" class="form-label">
                        <i data-lucide="map-pin"></i>
                        Restaurante
                    </label>
                    <select id="restaurant-select" class="form-select" disabled required>
                        <option value="" disabled selected>Selecciona primero una fecha</option>
                    </select>
                    <!-- Pequeña etiqueta que indica el Tipo (Delivery/Presencial) -->
                    <small id="restaurant-type-badge" style="display: none; font-weight: 600; text-transform: uppercase; color: var(--gold); margin-top: 0.3rem;"></small>
                </div>

                <!-- Dynamic Score Fields -->
                <div id="dynamic-fields" class="dynamic-fields-container">
                    <h3 style="font-family: var(--font-title); margin-bottom: 1.5rem;">Tus Puntajes</h3>
                    
                    <div class="form-group">
                        <label for="score-avg" class="form-label">
                            <i data-lucide="award"></i>
                            Promedio / Rating (1-10)
                        </label>
                        <input type="number" id="score-avg" class="form-input averages-input" min="0" max="10" step="0.1" placeholder="Ej: 9.5" required>
                    </div>

                    <div class="score-row-inputs">
                        <div class="form-group">
                            <label for="score-1" class="form-label">
                                <i data-lucide="utensils"></i>
                                Comida
                            </label>
                            <input type="number" id="score-1" class="form-input" min="0" max="10" step="0.1" placeholder="Ej: 9" required>
                        </div>

                        <!-- Este bloque cambia su label dependiendo de Presencial/Delivery -->
                        <div class="form-group">
                            <label for="score-2" class="form-label" id="label-score-2">
                                <i data-lucide="box" id="icon-score-2"></i>
                                <span id="text-score-2">Lugar / Presentación</span>
                            </label>
                            <input type="number" id="score-2" class="form-input" min="0" max="10" step="0.1" placeholder="Ej: 8.5" required>
                        </div>

                        <!-- Este bloque cambia su label dependiendo de Presencial/Delivery -->
                        <div class="form-group">
                            <label for="score-3" class="form-label" id="label-score-3">
                                <i data-lucide="smile" id="icon-score-3"></i>
                                <span id="text-score-3">Atención / Precio</span>
                            </label>
                            <input type="number" id="score-3" class="form-input" min="0" max="10" step="0.1" placeholder="Ej: 10" required>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="submit-btn">
                        <span class="btn-text">Cargar Reseña</span>
                        <div class="spinner"></div>
                    </button>

                    <div id="message-container" class="message-box"></div>
                </div>

            </form>
        </main>
        
        <footer class="footer" style="text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.9rem;">
            <p>Copyright 2026 - Comer.ar</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <!-- Scripts custom -->
    <!-- Nota: La lógica de darkmode básica está igual que el index -->
    <script>
        // Dark Mode Logic compartida
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const body = document.body;
        const settingsBtn = document.getElementById('settings-btn');
        const settingsMenu = document.getElementById('settings-menu');

        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        if (isDarkMode) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                localStorage.setItem('darkMode', 'true');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                localStorage.setItem('darkMode', 'false');
            }
        });

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
            const isExpanded = settingsBtn.getAttribute('aria-expanded') === 'true';
            settingsBtn.setAttribute('aria-expanded', !isExpanded);
        });

        document.addEventListener('click', (e) => {
            if (!settingsMenu.classList.contains('hidden') && !e.target.closest('.settings-nav')) {
                settingsMenu.classList.add('hidden');
                settingsBtn.setAttribute('aria-expanded', 'false');
            }
        });
    </script>
    <script src="carga.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
